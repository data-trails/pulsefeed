<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PulseFeed</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <nav class="topbar">
        <div class="brand">
          <div class="icon-ring">RSS</div>
          <div>
            <h1>PulseFeed</h1>
            <p>Lakeshore Advantage</p>
          </div>
        </div>
        <div class="tabs">
          <button class="tab-button active" data-tab="feed">Feed</button>
          <button class="tab-button" data-tab="calendar">Calendar</button>
          <button class="tab-button" data-tab="saved">Saved</button>
          <button class="tab-button" data-tab="sources">Sources</button>
        </div>
      </nav>

      <main class="container">
        <section class="toolbar">
          <div id="status-text">Loading updates…</div>
          <button id="refresh-button" class="link-button">Refresh</button>
        </section>
        <div id="pane"></div>
      </main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
