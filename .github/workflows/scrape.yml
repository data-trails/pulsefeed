name: Scrape planning commission feeds

on:
  schedule:
    # Runs daily at 7 AM Eastern (11 AM UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated feed if changed
        run: |
          git config user.name  "pulsefeed-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/feed.json
          if git diff --cached --quiet; then
            echo "No changes to feed.json"
          else
            git commit -m "chore: update feed.json [$(date -u +%Y-%m-%d)]"
            git push
          fi
